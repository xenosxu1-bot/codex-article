<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="0.55" stop-color="#f6fbf4"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/></filter>
  <style>
    .title{font:700 44px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#102033}.sub{font:400 22px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#526173}.label{font:700 24px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#172033}.small{font:400 18px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#526173}.tiny{font:400 15px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#667085}.code{font:500 18px Consolas,'Microsoft YaHei',monospace;fill:#243447}.card{fill:#fff;stroke:#e7edf3;stroke-width:1.5;filter:url(#shadow)}.pill{fill:#eff6ff;stroke:#bfdbfe}.green{fill:#ecfdf3;stroke:#bbf7d0}.orange{fill:#fff7ed;stroke:#fed7aa}.purple{fill:#f5f3ff;stroke:#ddd6fe}.dark{fill:#132238}.arrow{stroke:#6b7b8f;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7b8f"/></marker>
</defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<circle cx="1100" cy="100" r="130" fill="#dbeafe" opacity="0.45"/>
<circle cx="160" cy="620" r="120" fill="#fed7aa" opacity="0.35"/>
