<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="0.55" stop-color="#f6fbf4"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/></filter>
  <style>
    .title{font:700 44px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#102033}.sub{font:400 22px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#526173}.label{font:700 24px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#172033}.small{font:400 18px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#526173}.tiny{font:400 15px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#667085}.code{font:500 18px Consolas,'Microsoft YaHei',monospace;fill:#243447}.card{fill:#fff;stroke:#e7edf3;stroke-width:1.5;filter:url(#shadow)}.pill{fill:#eff6ff;stroke:#bfdbfe}.green{fill:#ecfdf3;stroke:#bbf7d0}.orange{fill:#fff7ed;stroke:#fed7aa}.purple{fill:#f5f3ff;stroke:#ddd6fe}.dark{fill:#132238}.arrow{stroke:#6b7b8f;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7b8f"/></marker>
</defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<circle cx="1100" cy="100" r="130" fill="#dbeafe" opacity="0.45"/>
<circle cx="160" cy="620" r="120" fill="#fed7aa" opacity="0.35"/>
<text x="70" y="82" class="title">weStudy 技术架构</text>
<text x="72" y="122" class="sub">页面不直接碰数据库，AI 调用也不放在小程序前端</text>

 <rect x="70" y="175" width="320" height="390" rx="28" class="card"/><text x="125" y="230" class="label">miniapp/</text><text x="110" y="285" class="small">pages 页面</text>
<text x="110" y="321" class="small">components 组件</text>
<text x="110" y="357" class="small">services 封装</text>
<text x="110" y="393" class="small">utils/cloudRequest.js</text>
 <rect x="480" y="175" width="340" height="390" rx="28" class="card"/><text x="535" y="230" class="label">cloudfunctions/api/</text><text x="525" y="285" class="small">index.js 统一路由</text>
<text x="525" y="321" class="small">handlers 业务模块</text>
<text x="525" y="357" class="small">openid 数据隔离</text>
<text x="525" y="393" class="small">统一错误返回</text>
 <rect x="910" y="175" width="300" height="390" rx="28" class="card"/><text x="965" y="230" class="label">CloudBase</text><text x="955" y="285" class="small">数据库</text>
<text x="955" y="321" class="small">云函数运行时</text>
<text x="955" y="357" class="small">AI 模块</text>
<text x="955" y="393" class="small">混元模型资源包</text>
 <path d="M400 370 H470" class="arrow"/><path d="M830 370 H900" class="arrow"/>
 <text x="410" y="345" class="tiny">wx.cloud.callFunction</text><text x="825" y="345" class="tiny">SDK 调用</text>
 
