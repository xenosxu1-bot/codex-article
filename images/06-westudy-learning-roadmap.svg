<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="0.55" stop-color="#f6fbf4"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/></filter>
  <style>
    .title{font:700 44px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#102033}.sub{font:400 22px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#526173}.label{font:700 24px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#172033}.small{font:400 18px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#526173}.tiny{font:400 15px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#667085}.code{font:500 18px Consolas,'Microsoft YaHei',monospace;fill:#243447}.card{fill:#fff;stroke:#e7edf3;stroke-width:1.5;filter:url(#shadow)}.pill{fill:#eff6ff;stroke:#bfdbfe}.green{fill:#ecfdf3;stroke:#bbf7d0}.orange{fill:#fff7ed;stroke:#fed7aa}.purple{fill:#f5f3ff;stroke:#ddd6fe}.dark{fill:#132238}.arrow{stroke:#6b7b8f;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7b8f"/></marker>
</defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<circle cx="1100" cy="100" r="130" fill="#dbeafe" opacity="0.45"/>
<circle cx="160" cy="620" r="120" fill="#fed7aa" opacity="0.35"/>
<text x="70" y="82" class="title">学习路线：先跑通闭环，再补细节</text>
<text x="72" y="122" class="sub">别从“写页面”开始，从一个孩子每天会不会回来开始</text>

 <rect x="80" y="250" width="160" height="120" rx="24" class="pill"/><circle cx="160" cy="235" r="28" fill="#fff" stroke="#cbd5e1"/><text x="152" y="244" class="label">1</text><text x="112" y="305" class="label">需求调研</text><text x="104" y="342" class="small">用户/场景</text><path d="M245 310 H270" class="arrow"/>
<rect x="275" y="250" width="160" height="120" rx="24" class="green"/><circle cx="355" cy="235" r="28" fill="#fff" stroke="#cbd5e1"/><text x="347" y="244" class="label">2</text><text x="307" y="305" class="label">V1.0 取舍</text><text x="299" y="342" class="small">做与不做</text><path d="M440 310 H465" class="arrow"/>
<rect x="470" y="250" width="160" height="120" rx="24" class="orange"/><circle cx="550" cy="235" r="28" fill="#fff" stroke="#cbd5e1"/><text x="542" y="244" class="label">3</text><text x="502" y="305" class="label">信息架构</text><text x="494" y="342" class="small">页面/数据</text><path d="M635 310 H660" class="arrow"/>
<rect x="665" y="250" width="160" height="120" rx="24" class="purple"/><circle cx="745" cy="235" r="28" fill="#fff" stroke="#cbd5e1"/><text x="737" y="244" class="label">4</text><text x="697" y="305" class="label">编码实现</text><text x="689" y="342" class="small">小步提交</text><path d="M830 310 H855" class="arrow"/>
<rect x="860" y="250" width="160" height="120" rx="24" class="pill"/><circle cx="940" cy="235" r="28" fill="#fff" stroke="#cbd5e1"/><text x="932" y="244" class="label">5</text><text x="892" y="305" class="label">联调测试</text><text x="884" y="342" class="small">异常兜底</text><path d="M1025 310 H1050" class="arrow"/>
<rect x="1055" y="250" width="160" height="120" rx="24" class="green"/><circle cx="1135" cy="235" r="28" fill="#fff" stroke="#cbd5e1"/><text x="1127" y="244" class="label">6</text><text x="1087" y="305" class="label">提审上线</text><text x="1079" y="342" class="small">材料冻结</text>
 <rect x="150" y="470" width="980" height="82" rx="24" class="card"/>
 <text x="195" y="520" class="label">目标不是一次做完整平台，而是让“打开 → 完成任务 → 得到反馈 → 明天再来”先成立。</text>
 
</svg>